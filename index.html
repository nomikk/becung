<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bé Cưng</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #FDFBF7;
            /* Off-white pastel background */
            overflow: hidden;
            font-family: 'Nunito', sans-serif;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #pan-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: inline-block;
            cursor: grab;
            transition: transform 1.2s cubic-bezier(0.15, 0.8, 0.15, 1);
            will-change: transform;
        }

        #pan-container:active {
            cursor: grabbing;
        }

        #pan-container.is-dragging {
            transition: none;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            transition: transform 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
            will-change: transform;
        }

        .image-wrapper img {
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        /* --- LOGO STORE NỔI TRÊN ẢNH --- */
        .store-logo {
            position: absolute;
            top: 6%;
            left: 50%;
            transform: translateX(-50%);
            color: #FFD700;
            /* Vàng óng */
            font-size: 5rem;
            font-weight: 900;
            text-transform: uppercase;
            /* Soft chunky 3D Text (Claymorphism) */
            text-shadow:
                4px 4px 0px #FF8F00,
                /* Cam cháy tạo khối 3D */
                6px 6px 15px rgba(255, 143, 0, 0.6);
            /* Đổ bóng phát sáng */
            letter-spacing: 8px;
            z-index: 5;
            pointer-events: none;
            width: 100%;
            text-align: center;
            font-family: 'Nunito', sans-serif;
        }

        /* Hotspot Core Styles */
        .hotspot {
            position: absolute;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .hotspot-trigger {
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            z-index: 2;
        }

        .hotspot-trigger::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            border-radius: 50%;
            z-index: 10;
        }

        .spot-marker {
            width: 24px;
            height: 24px;
            background: #FF9ECD;
            /* Pink button */
            border-radius: 50%;
            border: 3px solid #FFD700;
            /* Viền vàng óng */
            box-shadow:
                0 0 15px 5px rgba(255, 158, 205, 0.7),
                /* Glowing hồng */
                4px 4px 10px rgba(0, 0, 0, 0.15),
                inset 2px 2px 4px rgba(255, 255, 255, 0.6);
            position: relative;
            z-index: 3;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .pulse-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            border-radius: 50%;
            z-index: 1;
            pointer-events: none;
        }

        /* 4 làn sóng nối đuôi nhau màu Vàng */
        .pulse-ring::before,
        .pulse-ring::after,
        .spot-marker::before,
        .spot-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            border: 3px solid #FFD700;
            box-shadow: 0 0 10px 2px rgba(255, 215, 0, 0.5);
            /* Quầng sáng vàng nhẹ cho dải sóng */
            animation: slow-wave-pulse 4s infinite linear;
            pointer-events: none;
        }

        /* Chia thời gian delay để 4 vòng nối đều nhau (1 loop dài 4s) */
        .pulse-ring::before {
            animation-delay: 0s;
        }

        .pulse-ring::after {
            animation-delay: 1s;
        }

        .spot-marker::before {
            animation-delay: 2s;
            z-index: -1;
        }

        .spot-marker::after {
            animation-delay: 3s;
            z-index: -1;
        }

        .hotspot-trigger:hover .spot-marker {
            background: #FF85A1;
            border-color: #FF8F00;
            /* Đã gỡ bỏ hiệu ứng Transform Scale (không phóng to / beat) nữa */
            box-shadow:
                0 0 25px 8px rgba(255, 133, 161, 0.9),
                6px 6px 15px rgba(255, 158, 205, 0.3),
                inset 2px 2px 4px rgba(255, 255, 255, 0.9);
        }

        @keyframes slow-wave-pulse {
            0% {
                width: 24px;
                height: 24px;
                opacity: 1;
                border-width: 3px;
            }

            100% {
                width: 100px;
                height: 100px;
                opacity: 0;
                border-width: 0px;
            }
        }

        /* --- DEFAULT BACKGROUND FOR BLUR --- */
        .detail-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Sử dụng glassmorphism backdrop trực tiếp thay vì duplicate ảnh */
            background: rgba(253, 251, 247, 0.6);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            z-index: 1;
        }

        .detail-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.5s ease 0.1s, visibility 0.5s ease 0.1s;
        }

        .detail-overlay.show {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.4s ease 0s, visibility 0.4s ease 0s;
        }

        /* Claymorphism Panel */
        .detail-content {
            position: relative;
            z-index: 3;
            background: #FFFFFF;
            padding: 45px 40px;
            border-radius: 32px;
            width: 85%;
            max-width: 550px;
            text-align: left;
            border: 4px solid #FFFFFF;
            /* Clay Outer + Inner Drop Shadows */
            box-shadow:
                15px 15px 35px rgba(255, 158, 205, 0.15),
                -10px -10px 20px rgba(255, 255, 255, 0.8),
                inset 3px 3px 8px rgba(255, 255, 255, 0.9),
                inset -4px -4px 10px rgba(255, 203, 203, 0.3);
            transform: translateY(60px) scale(0.9);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            background-image: radial-gradient(#FFCBCB 2px, transparent 2px);
            background-size: 24px 24px;
            background-position: -12px -12px;
        }

        .detail-overlay.show .detail-content {
            transform: translateY(0) scale(1);
            transition-delay: 0.15s;
        }

        .detail-content h2 {
            font-weight: 900;
            font-size: 2.4rem;
            color: #FF85A1;
            margin: 0 0 24px 0;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px rgba(255, 203, 203, 0.5);
        }

        .detail-content ul {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #5D5D5D;
            margin: 0;
            padding-left: 0;
            font-weight: 700;
            list-style: none;
        }

        .detail-content ul li {
            margin-bottom: 16px;
            position: relative;
            padding-left: 38px;
            background: rgba(255, 255, 255, 0.6);
            padding-top: 12px;
            padding-bottom: 12px;
            padding-right: 15px;
            border-radius: 16px;
            box-shadow: inset 1px 1px 3px rgba(255, 255, 255, 1), 2px 2px 6px rgba(0, 0, 0, 0.03);
            border: 2px solid #FFF5F7;
        }

        .detail-content ul li::before {
            content: '☁️';
            position: absolute;
            left: 10px;
            top: 12px;
            font-size: 1.2rem;
        }

        /* Clay Close Button */
        .close-btn {
            position: relative;
            z-index: 4;
            background: #FF9ECD;
            color: #000000;
            border: 2px solid #000000;
            padding: 16px 36px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: 800;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
            box-shadow:
                4px 4px 0px rgba(0, 0, 0, 1),
                inset 2px 2px 5px rgba(255, 255, 255, 0.7);
            transform: translateY(30px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .detail-overlay.show .close-btn {
            transform: translateY(0);
            opacity: 1;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s, opacity 0.4s ease 0.25s;
        }

        .close-btn:hover {
            transform: scale(1.08) translateY(-4px);
            background: #FF85A1;
            box-shadow:
                6px 6px 0px rgba(0, 0, 0, 1),
                inset 2px 2px 5px rgba(255, 255, 255, 0.8);
        }

        /* --- FLOATING SOCIAL ICONS (CLAYMORPHISM) --- */
        .floating-socials {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 18px;
            pointer-events: none;
        }

        .floating-socials a {
            pointer-events: auto;
            width: 56px;
            height: 56px;
            border-radius: 20px;
            /* Squircle */
            background: #FFFFFF;
            color: #FF9ECD;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 22px;
            border: 3px solid #FFFFFF;
            /* Bubbly Claymorphism Shadow */
            box-shadow:
                6px 6px 14px rgba(0, 0, 0, 0.06),
                inset 3px 3px 6px rgba(255, 255, 255, 1),
                inset -3px -3px 6px rgba(0, 0, 0, 0.03);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .floating-socials a:hover {
            transform: scale(1.15) translateY(-6px);
            color: white;
            border-color: #FFFFFF;
            box-shadow:
                8px 12px 20px rgba(0, 0, 0, 0.1),
                inset 3px 3px 6px rgba(255, 255, 255, 0.5),
                inset -3px -3px 6px rgba(0, 0, 0, 0.1);
        }

        .floating-socials a.btn-fb:hover {
            background: #1877F2;
        }

        .floating-socials a.btn-msg:hover {
            background: #00B2FF;
        }

        .floating-socials a.btn-phone:hover {
            background: #00C853;
        }

        .floating-socials a.btn-map:hover {
            background: #FF5252;
        }

        @media (max-width: 768px) {
            .floating-socials {
                bottom: 20px;
                left: 20px;
                gap: 14px;
            }

            .floating-socials a {
                width: 48px;
                height: 48px;
                font-size: 18px;
                border-radius: 16px;
            }

            .store-logo {
                font-size: 3.5rem;
                top: 8%;
            }

            .detail-content {
                padding: 35px 25px;
                width: 90%;
            }

            .detail-content h2 {
                font-size: 1.8rem;
            }

            .detail-content ul li {
                font-size: 1rem;
            }

            /* --- GIAO DIỆN CHUYÊN BIỆT CHO MOBILE --- */
            /* Đưa cụm Social sang mép Phải màn hình */
            .floating-socials {
                left: auto;
                right: 20px;
                bottom: 20px;
                flex-direction: column-reverse;
                /* Đảo ngược để FB trên, Map dưới so khớp với lề đáy */
            }

            /* Thu nhỏ kích thước Nút bấm Object đi 15% (khoảng 20px) */
            .spot-marker,
            .pulse-ring {
                width: 20px;
                height: 20px;
            }

            @keyframes slow-wave-pulse {
                0% {
                    width: 20px;
                    height: 20px;
                    opacity: 1;
                    border-width: 3px;
                }

                100% {
                    width: 85px;
                    height: 85px;
                    opacity: 0;
                    border-width: 0px;
                }
            }

            /* Lôi toàn bộ Object ra khỏi mặt phẳng ảnh để neo ghim vĩnh viễn lên mặt kính màn hình */
            .hotspot {
                position: fixed !important;
                z-index: 40;
                /* Đảm bảo nằm trên ảnh nhưng dưới overlay info */
            }

            /* Bố trí các vị trí Đối Xứng với thanh Social (Nằm bên Trái) */
            /* Vị trí neo tĩnh dựa trên viewport height (vh). Map nằm dưới cùng, FB trên cùng */

            /* Đối xứng Phone -> Set áo quần */
            .hotspot[data-title="Set áo quần"] {
                left: 20px !important;
                bottom: calc(20px + 48px + 14px) !important;
                /* Đáy + 1 nút map + gap */
                top: auto !important;
            }

            /* Đối xứng Messenger -> Tã bỉm */
            .hotspot[data-title="Tã bỉm"] {
                left: 20px !important;
                bottom: calc(20px + (48px + 14px) * 2) !important;
                /* Đáy + 2 nút + gap */
                top: auto !important;
            }

            /* Đối xứng Facebook -> Combo đi sinh */
            .hotspot[data-title="Combo đi sinh"],
            .hotspot[data-title="Phụ kiện sơ sinh"] {
                left: 20px !important;
                bottom: calc(20px + (48px + 14px) * 3) !important;
                /* Đáy + 3 nút + gap */
                top: auto !important;
            }

            /* Đối xứng Map -> Đồ ăn dặm */
            .hotspot[data-title="Đồ ăn dặm"] {
                left: 20px !important;
                bottom: 20px !important;
                /* Tương ứng ngang Map dưới cùng */
                top: auto !important;
            }

            /* Giữ nguyên các Object ở trên ảnh: Chăm sóc bé, Sữa bột (Do User yêu cầu: "các sp chăm sóc giữ nguyên vị trí", "sữa bột di chuyển qua vị trí.." tức là trên Desktop, còn Mobile user không liệt kê, ngầm hiểu có thể vẫn dính trên ảnh hoặc ẩn. Yêu cầu ghi rõ: "object các sản phẩm chăm sóc giữu nguyên vị trí." nên ta trả lại position absolute cho 2 thằng này) */
            .hotspot[data-title="Các sản phẩm chăm sóc"],
            .hotspot[data-title="Sữa bột"] {
                position: absolute !important;
            }
        }
    </style>
</head>

<body>

    <!-- Lớp Container chứa ảnh, phục vụ riêng cho việc Kéo/Vuốt (Pan) -->
    <div id="pan-container">
        <!-- Khối Wrapper ảnh sẽ đóng vai trò thực thể Zoom -->
        <div class="image-wrapper" id="zoom-wrapper">
            <img src="shop.jpeg" alt="Background Store">

            <!-- Logo tiệm chèn trực tiếp vào giữa không gian thực của ảnh -->
            <div class="store-logo">Bé Cưng</div>

            <!-- Các điểm đỏ được gán cứng theo % của tấm ảnh gốc -->
            <!-- Object 1: Kệ ngoài cùng bên trái (Sản phẩm chăm sóc bé) -->
            <div class="hotspot" style="top: 56%; left: 11%;" data-title="Các sản phẩm chăm sóc"
                data-info="<ul><li>Si rô ho và các loại tinh dầu giữ ấm, giúp bé có giấc ngủ êm ái.</li><li>Kem dưỡng ẩm da dịu nhẹ, nâng niu làn da mỏng manh của con mỗi ngày.</li><li>Khăn ướt mềm mịn, thành phần tự nhiên và tiện lợi để mẹ dọn dẹp.</li></ul>">
                <div class="hotspot-trigger">
                    <div class="spot-marker"></div>
                    <div class="pulse-ring"></div>
                </div>
            </div>

            <!-- Object 2: Di dời sang vị trí cũ của Phụ kiện sơ sinh (Sữa bột) -->
            <div class="hotspot" style="top: 43%; left: calc(74% + 40px);" data-title="Sữa bột"
                data-info="<ul><li>Mang đến nguồn dinh dưỡng trọn vẹn, đồng hành cùng trẻ phát triển khỏe mạnh.</li><li>Thành phần mát lành, dễ tiêu hóa, hỗ trợ hệ miễn dịch tự nhiên của bé.</li><li>Hương vị thơm ngon, quen thuộc giúp bé luôn vui vẻ trong mỗi cữ sữa.</li></ul>">
                <div class="hotspot-trigger">
                    <div class="spot-marker"></div>
                    <div class="pulse-ring"></div>
                </div>
            </div>

            <!-- Object 3: Kệ đồ phía trên bên phải lon sữa (Tã bỉm) -->
            <div class="hotspot" style="top: calc(13% + 160px); left: calc(54% + 180px);" data-title="Tã bỉm"
                data-info="<ul><li>Bề mặt tã bông mềm mại, thấm hút tốt để bé yêu luôn cảm thấy khô thoáng.</li><li>Thiết kế linh hoạt, ôm trọn mọi cử động đáng yêu giúp bé vui chơi dễ dàng.</li><li>Màng đáy thoáng khí mỏng nhẹ nâng niu làn da, tránh cảm giác hầm bí.</li></ul>">
                <div class="hotspot-trigger">
                    <div class="spot-marker"></div>
                    <div class="pulse-ring"></div>
                </div>
            </div>

            <!-- Object 4: Kệ phía dưới (Đồ ăn dặm) -->
            <div class="hotspot" style="top: 66%; left: 58%;" data-title="Đồ ăn dặm"
                data-info="<ul><li>Những chiếc bánh tan ngay trong miệng, bổ sung năng lượng cho bé tập nhai.</li><li>Đa dạng hương vị tự nhiên từ ngũ cốc và trái cây, kích thích vị giác của trẻ.</li><li>Hỗ trợ bé làm quen với các thức ăn mới một cách tự nhiên và đầy hào hứng.</li></ul>">
                <div class="hotspot-trigger">
                    <div class="spot-marker"></div>
                    <div class="pulse-ring"></div>
                </div>
            </div>

            <!-- Object 5: Kệ nhánh xuóng một chút (Combo đi sinh) -->
            <div class="hotspot" style="top: calc(43% + 40px); left: calc(74% + 40px);" data-title="Combo đi sinh"
                data-info="<ul><li>Chuẩn bị sẵn sàng mọi vật dụng thiết yếu nhất cho mẹ và bé trong những ngày đầu.</li><li>Giúp mẹ tiết kiệm thời gian sửa soạn, bao gồm chăn ủ, áo sơ sinh, bao tay và các phụ kiện tiện lợi tinh tế.</li><li>Hoàn toàn an tâm chờ đón con yêu bình an với combo đầy đủ trọn vẹn.</li></ul>">
                <div class="hotspot-trigger">
                    <div class="spot-marker"></div>
                    <div class="pulse-ring"></div>
                </div>
            </div>

            <!-- Object 6: Kệ ngoài cùng sát mép phải (Set áo quần áo) -->
            <div class="hotspot" style="top: 60%; left: 92%;" data-title="Set áo quần"
                data-info="<ul><li>Chất liệu 100% cotton tự nhiên, thoáng mát và vô cùng thân thiện với làn da non nớt.</li><li>Bộ sưu tập với những sắc màu đáng yêu, rộng rãi để bé thoải mái trườn, bò.</li><li>Đường may cẩn thận, không gợn chỉ cọ xát gây khó chịu vào làn da bé xíu.</li></ul>">
                <div class="hotspot-trigger">
                    <div class="spot-marker"></div>
                    <div class="pulse-ring"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Container Overlay Bọc Lên Mọi Thứ Khi Đã Zoom -->
    <div id="detail-overlay" class="detail-overlay">
        <div class="detail-bg" id="detail-bg"></div>

        <div class="detail-content">
            <h2 id="detail-title">Tên Object</h2>
            <p id="detail-info">Thông tin chi tiết về sản phẩm này sẽ được hiển thị ở đây...</p>
        </div>

        <button class="close-btn" id="close-btn"><i class="fa-solid fa-arrow-left"></i> Trở về Cửa Hàng</button>
    </div>

    <!-- Nút Mạng Xã Hội Trôi Nổi (Floating) -->
    <div class="floating-socials">
        <a href="#" class="btn-fb" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="#" class="btn-msg" title="Messenger"><i class="fa-brands fa-facebook-messenger"></i></a>
        <a href="#" class="btn-phone" title="Gọi Điện"><i class="fa-solid fa-phone"></i></a>
        <a href="#" class="btn-map" title="Bản Đồ"><i class="fa-solid fa-map-location-dot"></i></a>
    </div>

    <!-- Script điều khiển Zoom cực mượt (Cinematic Effect) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hotspots = document.querySelectorAll('.hotspot');
            const wrapper = document.getElementById('zoom-wrapper');
            const img = wrapper.querySelector('img');
            const overlay = document.getElementById('detail-overlay');
            const closeBtn = document.getElementById('close-btn');
            const detailTitle = document.getElementById('detail-title');
            const detailInfo = document.getElementById('detail-info');

            // --- THUẬT TOÁN XÓA VIỀN ĐEN & CHỈ CHO CUỘN NGANG ---
            function resizeCover() {
                if (!img.naturalWidth) return;
                const aspect = img.naturalWidth / img.naturalHeight;
                const winAspect = window.innerWidth / window.innerHeight;

                // Cập nhật lại cơ chế Fill Fullscreen: Dựa trên tỷ lệ (Aspect Ratio)
                // Nếu ảnh DÀI hơn khung hình -> Dóng vừa y Chiều Cao, nới rộng Chiều Ngang rớt lề mượt mà
                if (aspect > winAspect) {
                    wrapper.style.height = window.innerHeight + 'px';
                    wrapper.style.width = Math.ceil(window.innerHeight * aspect) + 'px';
                }
                // Nếu ảnh CAO hơn khung hình -> Dóng vừa y Chiều Ngang, nới rộng Chiều Cao dư dội lên trên/dưới
                else {
                    wrapper.style.width = window.innerWidth + 'px';
                    wrapper.style.height = Math.ceil(window.innerWidth / aspect) + 'px';
                }

                // Cập nhật lại giới hạn drag panX, panY sau khi màn hình bị resize
                if (typeof updatePan === 'function') {
                    const maxPosX = Math.max(0, (wrapper.offsetWidth - window.innerWidth) / 2);
                    if (panX > maxPosX) panX = maxPosX;
                    if (panX < -maxPosX) panX = -maxPosX;

                    // Fix cứng Y bằng 0 để không bao giờ vuốt dọc. 
                    // Khi dư chiều cao (trên Desktop), ảnh sẽ tự động bị crop đều vùng trên và vùng dưới (giữ nguyên tâm ảnh).
                    panY = 0;
                    updatePan();
                }
            }

            // --- LOGIC KÉO VUỐT & CHẠY THEO CHUỘT ---
            const panContainer = document.getElementById('pan-container');
            let panX = 0;
            let panY = 0;
            let isDragging = false;
            let lastClientX = 0;
            let lastClientY = 0;
            let dragStartX = 0;
            let dragStartY = 0;
            let hasDragged = false; // Cờ theo dõi để không nhầm giữa Kéo và Click
            let lastTouchTime = 0; // Đánh dấu thời gian chạm cuối để tách biệt chuột

            // Tham số cho tính năng trượt ngón tay trên điện thoại
            const SWIPE_MULTIPLIER = 0.75; // Giảm tốc độ bám vuốt còn 1/2 để ảnh không bị chạy quá nhanh
            let velocityX = 0;
            let velocityY = 0;
            let lastMoveTime = 0;
            let velocityHistory = []; // Lưu trữ lịch sử vận tốc để trung bình hóa, chống giật khuy (Advanced Easing)

            let glideStartTime = 0; // Đánh dấu mốc bắt đầu Quán Tính Trôi (Momentum)

            function startDrag(clientX, clientY) {
                if (overlay.classList.contains('show')) return; // Khóa kéo khi đang hiện thông tin

                // CƠ CHẾ BẢO VỆ UX (MOBILE GIẢM BẢO VỆ XUỐNG DƯỚI 30% CHẶNG ĐƯỜNG = 300ms)
                const protectionTime = window.innerWidth <= 768 ? 300 : 840;
                if (Date.now() - glideStartTime < protectionTime) {
                    return;
                }

                isDragging = true;
                hasDragged = false;
                panContainer.classList.add('is-dragging');

                lastClientX = clientX;
                lastClientY = clientY;
                dragStartX = clientX;
                dragStartY = clientY;
                lastMoveTime = Date.now();
                velocityX = 0;
                velocityY = 0;
                velocityHistory = [];
            }

            function onDrag(clientX, clientY) {
                if (!isDragging) return;

                // Ghi nhận hasDragged bằng tọa độ thực của tay
                if (Math.abs(clientX - dragStartX) > 8 || Math.abs(clientY - dragStartY) > 8) {
                    hasDragged = true;
                }

                // Tính gia tốc (delta) với hệ số nhân giảm bớt
                const deltaX = (clientX - lastClientX) * SWIPE_MULTIPLIER;
                const deltaY = (clientY - lastClientY) * SWIPE_MULTIPLIER;

                let targetX = panX + deltaX;
                let targetY = panY + deltaY;

                // Thuật toán trung bình hóa vận tốc (Moving Average Velocity)
                const now = Date.now();
                const dt = now - lastMoveTime;
                if (dt > 0 && dt < 100) { // Bỏ qua nếu khung hình bị lag quá lâu
                    let instVelX = deltaX / dt;
                    let instVelY = deltaY / dt;

                    velocityHistory.push({ x: instVelX, y: instVelY });
                    if (velocityHistory.length > 5) velocityHistory.shift(); // Chỉ lấy 5 mẫu gần nhất

                    // Tính trung bình
                    velocityX = velocityHistory.reduce((sum, v) => sum + v.x, 0) / velocityHistory.length;
                    velocityY = velocityHistory.reduce((sum, v) => sum + v.y, 0) / velocityHistory.length;
                }

                lastClientX = clientX;
                lastClientY = clientY;
                lastMoveTime = now;

                // Giới hạn max pan để mép ảnh không bao giờ bị lòi vào trong màn hình
                const maxPosX = Math.max(0, (wrapper.offsetWidth - window.innerWidth) / 2);
                const maxPosY = Math.max(0, (wrapper.offsetHeight - window.innerHeight) / 2);

                // Thuật toán Clamp và Neo lại điểm kéo khi chạm viền (giống iOS)
                if (targetX > maxPosX) { targetX = maxPosX; }
                else if (targetX < -maxPosX) { targetX = -maxPosX; }

                // Khóa hệ trục Y, không cho vuốt dọc
                targetY = 0;

                panX = targetX;
                panY = targetY;

                updatePan();
            }

            function endDrag() {
                isDragging = false;
                panContainer.classList.remove('is-dragging');

                // Check nếu ngừng di chuyển ngón tay rồi mới nhả ra (>50ms không có frame kéo nào) 
                // thì cắt bỏ gia tốc để tránh việc ảnh tự trượt trong khi mình đang muốn nó đứng yen.
                if (Date.now() - lastMoveTime > 50) {
                    velocityX = 0;
                    velocityY = 0;
                }

                // Thực thi Quán Tính (Momentum) mượt mà cao cấp
                if (hasDragged && (Math.abs(velocityX) > 0.05 || Math.abs(velocityY) > 0.05)) {
                    // Tăng thêm gia tốc dạt (1800ms) để bù trừ cho tốc độ vuốt đã bị cắt đi một nửa
                    // CSS sẽ đảm nhiệm làm đường cong giảm tốc y hệt như bánh xe ma sát mặt băng
                    let targetX = panX + (velocityX * 1800);
                    let targetY = panY + (velocityY * 1800);

                    const maxPosX = Math.max(0, (wrapper.offsetWidth - window.innerWidth) / 2);

                    // Khóa neo bằng Math thay vì if/else cứng
                    targetX = Math.max(-maxPosX, Math.min(maxPosX, targetX));
                    targetY = 0; // Fix cứng Y

                    panX = targetX;
                    panY = targetY;
                    updatePan();

                    // Neo chuẩn thời gian bắt đầu trôi để kích hoạt "Cơ chế bảo vệ 0.5s"
                    glideStartTime = Date.now();
                }
            }

            function updatePan() {
                panContainer.style.transform = `translate(calc(-50% + ${panX}px), calc(-50% + ${panY}px))`;
            }

            // Ghi chú: Đã tắt hoàn toàn hệ thống bắt sự kiện Mousemove trên Desktop. 
            // Không còn hiệu ứng Parallax Cinematic chạy theo chuột, biến ảnh thành một Poster tĩnh.

            // Đăng ký Event Touch (Mobile)
            panContainer.addEventListener('touchstart', (e) => {
                lastTouchTime = Date.now();
                startDrag(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: false });
            window.addEventListener('touchmove', (e) => {
                lastTouchTime = Date.now();
                if (isDragging) {
                    // Chống cuộn dọc mặc định của trình duyệt điện thoại khi đang vuốt ngang ảnh
                    if (e.cancelable) e.preventDefault();
                }
                onDrag(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: false });
            window.addEventListener('touchend', (e) => {
                lastTouchTime = Date.now();
                endDrag();
            });


            // Gắn sự kiện khi kéo màn hình để resize liên tục
            window.addEventListener('resize', resizeCover);
            if (img.complete) {
                resizeCover();
            } else {
                img.addEventListener('load', resizeCover);
            }

            // Hiệu ứng "Giả Siêu Zoom" bằng CSS Transform Origin tự động
            hotspots.forEach(spot => {
                const trigger = spot.querySelector('.hotspot-trigger');

                trigger.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Cực kỳ quan trọng: Nếu người dùng vừa thực hiện hành động Kéo ảnh thì không kích hoạt Click
                    if (hasDragged) return;

                    // Đã loại bỏ logic Zoom (scale 5) để ảnh giữ nguyên kích thước tĩnh 100%

                    // Thay đổi nội dung hiển thị theo dữ liệu được nhét ở HTML Attributes
                    detailTitle.innerText = spot.getAttribute('data-title');
                    detailInfo.innerHTML = spot.getAttribute('data-info'); // Dùng innerHTML để hỗ trợ thẻ HTML (List)

                    // Hiển thị Overlay ngay lập tức với tốc độ nhẹ nhàng
                    setTimeout(() => {
                        overlay.classList.add('show');
                    }, 50);
                });
            });

            // Logic Quay Về Màn Hình Chính
            closeBtn.addEventListener('click', () => {
                // Tắt Overlay từ từ
                overlay.classList.remove('show');
                // Tính năng zoom đã bị bỏ nên không cần phục hồi tỷ lệ (scale)
            });
        });
    </script>
</body>

</html>
